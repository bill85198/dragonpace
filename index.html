<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DragonPace</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DragonPace">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-startup-image" href="icons/splash.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');

:root{
  --red:#FF2A0A; --red2:#ff5030;
  --gold:#FFB300; --gold2:#ffd040;
  --bg:#000000; --bg2:#060c18; --bg3:#0d1828;
  --text:#FFFFFF; --muted:#1a3055; --muted2:#5880a0;
  --cyan:#00E5FF; --green:#00FF7A; --teal:#00d4b0;
  --border:rgba(255,255,255,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;}

/* scanline overlay */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.03) 4px);}

.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 120% 50% at 50% 0%,rgba(232,40,11,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%,rgba(0,212,255,.04) 0%,transparent 50%);}

.app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}

/* HEADER */
header{padding:9px 16px 8px;display:flex;align-items:center;justify-content:space-between;
  background:rgba(5,8,14,.96);backdrop-filter:blur(30px);
  border-bottom:1px solid rgba(232,40,11,.14);position:sticky;top:0;z-index:100;}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:var(--red);
  letter-spacing:4px;text-shadow:0 0 18px rgba(232,40,11,.45);}
.logo span{color:var(--gold);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.live-badge{display:flex;align-items:center;gap:4px;border-radius:3px;padding:3px 8px;
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px;
  background:rgba(0,232,122,.07);border:1px solid rgba(0,232,122,.18);color:var(--green);transition:all .3s;}
.live-dot{width:4px;height:4px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.time-badge{font-family:'Orbitron',monospace;font-size:10px;color:var(--muted2);letter-spacing:1px;}

/* NAV */
nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);}
nav button{flex:1;background:none;border:none;color:var(--muted2);padding:9px 0;font-size:8px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .2s;
  font-family:'Noto Sans TC',sans-serif;letter-spacing:.5px;text-transform:uppercase;}
nav button svg{width:17px;height:17px;}
nav button.active{color:var(--red);}
nav button.active svg{filter:drop-shadow(0 0 5px var(--red));}

.page{display:none;flex:1;overflow-y:auto;padding-bottom:16px;}
.page.active{display:block;}

/* ══ STATUS BAR ══ */
.status-bar{display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);}
.sb-course{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-shadow:0 0 10px rgba(255,179,0,.4);}
.sb-meta{font-size:8px;color:var(--muted2);margin-top:1px;letter-spacing:.3px;}
.sb-right{display:flex;align-items:center;gap:8px;}
.sb-set{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:1px;text-shadow:0 0 10px rgba(0,229,255,.5);}
.sb-time{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:1px;margin-left:4px;}
.pips{display:flex;gap:3px;align-items:center;}
.pip{width:6px;height:6px;border-radius:50%;background:var(--muted);border:1px solid var(--muted);transition:all .25s;}
.pip.done{background:var(--red);border-color:var(--red);}
.pip.active{background:var(--gold);border-color:var(--gold);animation:pipPop .65s infinite alternate;}
@keyframes pipPop{from{transform:scale(.8)}to{transform:scale(1.3)}}

/* ══ GAUGE AREA ══ */
.gauge-area{padding:8px 8px 6px;display:flex;flex-direction:column;gap:7px;}
.quad-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}

/* ══ PANEL (base) ══ */
.panel{
  background:linear-gradient(145deg,#091525,#0d1e32);
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  padding:11px 12px 10px;
  min-height:105px;
}
.panel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pa,rgba(255,255,255,.15));}
.p-bpm   {--pa:var(--gold);}
.p-speed {--pa:var(--cyan);}
.p-stroke{--pa:var(--green);}
.p-dist  {--pa:#00c8ff;}

.p-label{font-size:7px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:#7a9ec0;margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.p-dot{width:4px;height:4px;border-radius:50%;background:var(--pa,var(--muted2));box-shadow:0 0 6px var(--pa,transparent);flex-shrink:0;}

.p-val{font-family:'Orbitron',monospace;font-weight:900;line-height:1;transition:color .12s;}
.p-bpm   .p-val{font-size:52px;color:var(--gold);text-shadow:0 0 28px rgba(255,179,0,.6),0 2px 0 rgba(0,0,0,.8);}
.p-speed .p-val{font-size:52px;color:var(--cyan);text-shadow:0 0 28px rgba(0,229,255,.6),0 2px 0 rgba(0,0,0,.8);}
.p-dist  .p-val{font-size:44px;color:#60d8ff;text-shadow:0 0 28px rgba(0,200,255,.55),0 2px 0 rgba(0,0,0,.8);}
.p-stroke .p-val{font-size:52px;color:var(--green);text-shadow:0 0 28px rgba(0,255,122,.55),0 2px 0 rgba(0,0,0,.8);}
.p-val.beat{animation:vbeat .1s cubic-bezier(.05,2,.3,1);}
@keyframes vbeat{0%{transform:scale(1.06)}100%{transform:scale(1)}}

.p-unit{font-size:8px;color:#8aaccc;letter-spacing:1.5px;margin-top:4px;font-weight:600;}
.p-sub {font-size:8px;color:var(--muted2);margin-top:3px;}

/* ══ METRONOME PANEL ══ */
.panel-metro{flex-direction:row;align-items:stretch;padding:0;min-height:76px;background:linear-gradient(145deg,#091525,#0d1e32);}
.metro-arc{flex-shrink:0;width:76px;height:76px;position:relative;border-right:1px solid var(--border);}
.metro-arc svg{width:76px;height:76px;display:block;}
.arc-bg-r{fill:none;stroke:var(--bg3);stroke-width:6;}
.arc-fill-r{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;stroke-dasharray:182;stroke-dashoffset:182;transform-origin:50% 50%;transform:rotate(-90deg);filter:drop-shadow(0 0 4px rgba(240,165,0,.55));}
.metro-arc-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.metro-arc-bpm{font-family:'Orbitron',monospace;font-size:17px;font-weight:900;color:var(--gold);text-shadow:0 0 20px rgba(255,179,0,.7),0 2px 0 rgba(0,0,0,.9);line-height:1;}
.metro-arc-lbl{font-size:5px;color:var(--muted2);letter-spacing:2px;margin-top:1px;}
.metro-info{flex:1;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;gap:2px;}
.metro-lbl{font-size:7px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted2);}
.metro-val{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:var(--gold);text-shadow:0 0 24px rgba(255,179,0,.6),0 2px 0 rgba(0,0,0,.9);line-height:1;}
.metro-phase{font-size:8px;color:var(--muted2);margin-top:2px;letter-spacing:.5px;}
.metro-beat{flex-shrink:0;width:40px;border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px 0;}
.beat-bar{width:18px;height:4px;border-radius:2px;background:var(--muted);transition:background .05s,box-shadow .05s,width .05s;}
.beat-bar.b-on{background:var(--gold);box-shadow:0 0 8px rgba(240,165,0,.65);width:26px;}
.beat-bar.b-accent{background:var(--red);box-shadow:0 0 10px rgba(232,40,11,.75);width:30px;}

/* ══ ANNOUNCE STRIP ══ */
.announce-strip{display:flex;align-items:center;gap:8px;background:var(--bg2);border-radius:6px;border:1px solid rgba(0,212,255,.1);padding:7px 11px;min-height:32px;transition:all .2s;}
.announce-strip.warn{border-color:rgba(240,165,0,.28);background:rgba(240,165,0,.03);}
.announce-strip.danger{border-color:rgba(232,40,11,.3);background:rgba(232,40,11,.04);}
.announce-icon{font-size:10px;color:var(--muted2);flex-shrink:0;font-family:'Orbitron',monospace;}
.announce-text{font-size:11px;font-weight:700;color:var(--cyan);flex:1;letter-spacing:.3px;}

/* ══ SEGMENT FLOW ══ */
.seg-flow{background:var(--bg2);border-radius:7px;padding:9px 11px 7px;border:1px solid var(--border);}
.sf-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.sf-title{font-size:8px;font-weight:700;color:#FFFFFF;letter-spacing:.5px;}
.sf-frac{font-family:'Orbitron',monospace;font-size:8px;color:var(--muted2);}
.seg-cards{display:flex;gap:3px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.seg-cards::-webkit-scrollbar{display:none;}
.seg-card{flex-shrink:0;min-width:48px;background:var(--bg3);border-radius:5px;padding:5px 4px;text-align:center;border:1px solid transparent;transition:all .18s;position:relative;}
.seg-card.s-done{opacity:.2;}
.seg-card.s-active{border-color:rgba(240,165,0,.4);background:rgba(240,165,0,.06);}
.seg-arrow{flex-shrink:0;display:flex;align-items:center;color:var(--muted);font-size:7px;}
.sc-bpm{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--muted2);}
.seg-card.s-active .sc-bpm{color:var(--gold);}
.sc-cnt{font-size:7px;color:var(--muted);margin-top:1px;}
.prog-bar{height:5px;background:#1a2e44;border-radius:3px;display:flex;overflow:hidden;margin-top:6px;}
.prog-seg{height:100%;position:relative;}
.prog-fill{height:100%;background:var(--gold);transition:width .18s linear;}
.prog-labels{display:flex;margin-top:2px;}
.prog-lbl{font-size:6px;color:var(--muted);text-align:center;overflow:hidden;}

/* ══ CONTROLS ══ */
.ctrl-row{display:grid;grid-template-columns:1fr auto auto;gap:7px;}
.btn-start{padding:13px;font-size:13px;font-weight:700;font-family:'Orbitron',monospace;letter-spacing:3px;background:transparent;border:1px solid var(--red);color:var(--red);border-radius:6px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;text-shadow:0 0 12px rgba(232,40,11,.35);box-shadow:inset 0 0 16px rgba(232,40,11,.04),0 0 10px rgba(232,40,11,.08);}
.btn-start::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(232,40,11,.08),transparent);transition:opacity .2s;}
.btn-start.running{border-color:var(--gold);color:var(--gold);text-shadow:0 0 12px rgba(240,165,0,.35);}
.btn-start:active{transform:scale(.97);}
.btn-reset{padding:13px 14px;background:transparent;border:1px solid var(--border);color:var(--muted2);border-radius:6px;cursor:pointer;font-size:15px;transition:all .18s;}
.btn-end{padding:13px 14px;background:var(--red2);border:none;color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-weight:bold;transition:all .18s;}

/* ══ OTHER PAGES ══ */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin:9px 12px;padding:13px;position:relative;overflow:hidden;}
.card-title{font-size:8px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;}
.workout-list{padding:0 12px;}
.workout-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:6px;cursor:pointer;transition:all .18s;}
.workout-item.selected{border-color:rgba(240,165,0,.4);background:rgba(240,165,0,.04);}
.wi-header{display:flex;justify-content:space-between;align-items:center;}
.wi-name{font-weight:700;font-size:12px;}
.wi-tag{font-size:7px;background:rgba(240,165,0,.1);color:var(--gold);border-radius:2px;padding:2px 5px;letter-spacing:.5px;}
.wi-segs{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap;}
.wi-seg{font-size:8px;background:rgba(240,165,0,.08);color:rgba(240,165,0,.7);border-radius:2px;padding:1px 5px;}

.seg-row{display:flex;align-items:center;gap:6px;background:var(--bg3);border-radius:6px;padding:7px 9px;margin-bottom:5px;}
.seg-idx{font-family:'Orbitron',monospace;font-size:10px;color:var(--gold);min-width:16px;}
.seg-input{flex:1;background:var(--bg);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:5px;padding:6px 7px;font-size:13px;text-align:center;}
.btn-save{width:100%;padding:11px;background:transparent;color:var(--red);border:1px solid var(--red);border-radius:6px;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:5px;}
.btn-load-train{width:100%;padding:9px;background:transparent;color:var(--muted2);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}

.history-item{display:flex;gap:9px;align-items:center;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin:0 12px 6px;}
.hi-date{font-family:'Orbitron',monospace;font-size:9px;color:var(--gold);text-align:center;line-height:1.4;min-width:24px;}
.hi-body{flex:1;}
.hi-name{font-weight:700;font-size:11px;}
.hi-meta{font-size:7px;color:var(--muted2);margin-top:2px;}
.hi-stats{display:flex;gap:7px;margin-top:3px;}
.hi-stat{font-size:7px;color:var(--muted2);}
.hi-stat span{color:var(--cyan);font-family:'Orbitron',monospace;font-weight:700;}
.export-row{display:flex;gap:6px;margin:0 12px 7px;flex-wrap:wrap;}
.export-btn{flex:1;padding:12px;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.3);color:var(--cyan);border-radius:6px;font-size:11px;cursor:pointer;font-family:'Orbitron',monospace;font-weight:700;letter-spacing:1px;transition:all .18s;text-align:center;box-shadow: 0 0 10px rgba(0,212,255,.1);}

.section-header{font-size:7px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:2px;padding:11px 12px 3px;}
.toast{position:fixed;bottom:74px;left:50%;transform:translateX(-50%) translateY(10px);background:rgba(5,8,14,.98);border:1px solid rgba(0,212,255,.2);color:var(--cyan);padding:6px 12px;border-radius:4px;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px;opacity:0;transition:all .2s;z-index:9998;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ LAP BOARD ══ */
.lap-section{background:var(--bg2);border-radius:8px;border:1px solid var(--border);overflow:hidden;}
.lap-section-hdr{display:flex;align-items:center;gap:7px;padding:8px 12px;background:var(--bg3);cursor:pointer;user-select:none;}
.lap-hdr-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.lap-hdr-title{font-size:8px;font-weight:700;letter-spacing:2.5px;color:#7a9ec0;flex:1;}
.lap-count-badge{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;color:var(--gold);background:rgba(255,179,0,.1);border:1px solid rgba(255,179,0,.2);border-radius:3px;padding:2px 7px;}
.lap-table-hdr{display:grid;grid-template-columns:60px 52px 1fr 1fr 1fr;padding:6px 12px;background:var(--bg3);border-top:1px solid var(--border);font-size:7px;font-weight:700;color:var(--muted2);}
.lap-table-hdr > *:not(:first-child){text-align:right;}
.lap-scroll{max-height:280px;overflow-y:auto;}
.lap-row{display:grid;grid-template-columns:60px 52px 1fr 1fr 1fr;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.lap-idx-label{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--gold);}
.lap-idx-time{font-size:7px;color:var(--muted2);font-family:'Orbitron',monospace;}
.lap-target{display:flex;flex-direction:column;align-items:flex-end;}
.lap-target-val{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--muted2);}
.lap-cell{display:flex;flex-direction:column;align-items:flex-end;}
.lap-cell-val{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;}
.lc-blue{color:#60d8ff;}
.lap-empty{text-align:center;padding:22px 0;font-size:10px;color:var(--muted2);}

/* ══ CHART MODAL ══ */
.chart-modal{position:fixed;inset:0;background:rgba(5,8,14,.95);backdrop-filter:blur(10px);z-index:10000;display:flex;flex-direction:column;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.chart-modal.show{opacity:1;pointer-events:auto;}
.chart-hdr{font-family:'Orbitron',monospace;font-size:16px;color:var(--cyan);margin-bottom:15px;text-align:center;}
.chart-container{flex:1;position:relative;background:#0a1220;border:1px solid var(--border);border-radius:12px;padding:10px;}
.chart-legend{position:absolute;top:15px;left:15px;display:flex;gap:12px;}
.cl-item{font-size:10px;font-weight:bold;display:flex;align-items:center;gap:4px;}
.cl-dot{width:8px;height:8px;border-radius:50%;}
.btn-close-chart{margin-top:20px;padding:14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>
<div class="bg-fx"></div>
<div class="app">

<header>
  <div class="logo">DRAGON<span>PACE</span></div>
  <div class="hdr-right">
    <div class="live-badge" id="liveBadge"><div class="live-dot"></div>READY</div>
    <div class="time-badge" id="clockBadge">--:--</div>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('train',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>儀錶板
  </button>
  <button onclick="showPage('builder',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>課表
  </button>
  <button onclick="showPage('data',this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>數據
  </button>
</nav>

<div id="page-train" class="page active">
  <div class="status-bar">
    <div>
      <div class="sb-course" id="selectedWorkoutLabel">未選擇課表</div>
      <div class="sb-meta" id="courseMetaLabel">--</div>
    </div>
    <div class="sb-right">
      <div class="pips" id="pipsRow"></div>
      <div class="sb-set" id="currentSet">--</div>
      <div class="sb-time" id="elapsedTime">00:00</div>
    </div>
  </div>

  <div class="gauge-area">
    <div class="quad-grid">
      <div class="panel p-bpm">
        <div class="p-label"><div class="p-dot"></div>當前槳頻</div>
        <div class="p-val" id="actualBpm">--</div>
        <div class="p-unit">槳 / 分</div>
        <div class="p-sub" id="segName">--</div>
      </div>
      <div class="panel p-speed">
        <div class="p-label"><div class="p-dot"></div>當前船速</div>
        <div class="p-val" id="speedVal">0.0</div>
        <div class="p-unit">km/h</div>
        <div class="p-sub speed-delta" id="speedDelta">— GPS</div>
      </div>
      <div class="panel p-stroke">
        <div class="p-label"><div class="p-dot"></div>累積划槳</div>
        <div class="p-val" id="totalStrokes">0</div>
        <div class="p-unit">槳</div>
      </div>
      <div class="panel p-dist">

    <div class="chart-legend">
      <div class="cl-item" style="color:var(--gold);"><div class="cl-dot" style="background:var(--gold);"></div>槳頻 (SPM)</div>
      <div class="cl-item" style="color:var(--cyan);"><div class="cl-dot" style="background:var(--cyan);"></div>船速 (km/h)</div>

<script>
// ════════ DATA ════════
const PRESETS=[
  {id:'free_obs',name:'自由觀察 (自動計槳)',tag:'記錄',sets:1,rest:0,segments:[],isFree:true},
  {id:'pa',name:'漸進頻率訓練 A',tag:'耐力',sets:3,rest:60,segments:[{bpm:40,count:30},{bpm:45,count:30},{bpm:60,count:30}]},
  {id:'pb',name:'比賽起步訓練 B',tag:'爆發',sets:1,rest:0,segments:[{bpm:70,count:3},{bpm:65,count:7},{bpm:50,count:40},{bpm:70,count:20}]}
];
let customWorkouts=[], selectedWorkout=PRESETS[0];

// ════════ STATE ════════
let isRunning=false, isObservationMode=false, segIdx=0, strokeInSeg=0, currentSet=1;
let totalStrokes=0, elapsedSec=0;
let metroTimer=null, clockTimer=null, arcRaf=null, obsTimer=null;
let simSpeed=0, lastSpeed=0, totalDistKm=0;

// ════════ WHISTLE AUDIO (Web Audio API) ════════
let audioCtx=null;
const getCtx=()=>{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;};

function toneWhistle(baseFreq, duration, vol) {
  try {
    const c = getCtx();
    const o = c.createOscillator();
    const gn = c.createGain();
    o.type = 'sine'; // Sine wave is piercing like a whistle
    o.connect(gn);
    gn.connect(c.destination);

    // Whistle frequency envelope (starts normal, goes up sharply, then trails off)
    o.frequency.setValueAtTime(baseFreq, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(baseFreq * 1.15, c.currentTime + duration * 0.3);
    o.frequency.exponentialRampToValueAtTime(baseFreq, c.currentTime + duration);

    // Whistle volume envelope (sharp attack, linear decay)
    gn.gain.setValueAtTime(0, c.currentTime);
    gn.gain.linearRampToValueAtTime(vol, c.currentTime + 0.02);
    gn.gain.exponentialRampToValueAtTime(0.01, c.currentTime + duration);

    o.start(c.currentTime);
    o.stop(c.currentTime + duration);
  } catch(e) {}
}

const accentTone = () => toneWhistle(2500, 0.2, 0.8); // High pitched, long (Start/Strong beat)
const beatTone = () => toneWhistle(2000, 0.1, 0.3);   // Lower, short (Weak beat)
const cdTone = (n) => toneWhistle(1600 + n * 200, 0.15, 0.6); // Countdown

function speak(t){if('speechSynthesis'in window){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='zh-TW';u.rate=1.15;speechSynthesis.speak(u);}}

// ════════ GPS & SENSOR ════════
let gpsWatchId=null, lastGpsPos=null, gpsGranted=false;
function startRealGPS(){
  if(!('geolocation' in navigator)) return;
  navigator.geolocation.getCurrentPosition(
    ()=>{ gpsGranted=true; watchGPS(); },
    (e)=>{ console.warn('GPS denied',e); },
    {enableHighAccuracy:true,timeout:10000}
  );
}
function watchGPS(){
  if(gpsWatchId!=null) return;
  gpsWatchId=navigator.geolocation.watchPosition(pos=>{
    const spd=pos.coords.speed!=null?pos.coords.speed*3.6:0;
    simSpeed=Math.max(0,spd);
    if(isRunning&&lastGpsPos){
      const R=6371, dLat=(pos.coords.latitude-lastGpsPos.latitude)*Math.PI/180;
      const dLon=(pos.coords.longitude-lastGpsPos.longitude)*Math.PI/180;
      const a=Math.sin(dLat/2)**2+Math.cos(lastGpsPos.latitude*Math.PI/180)*Math.cos(pos.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
      const d=2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
      if(d<0.2) totalDistKm+=d;
    }
    lastGpsPos=pos.coords; updateUI();
  },e=>{}, {enableHighAccuracy:true,maximumAge:1000,timeout:10000});
}
function stopGPS(){
  if(gpsWatchId!=null){navigator.geolocation.clearWatch(gpsWatchId);gpsWatchId=null;}
  lastGpsPos=null;
}

// ════════ ACCELEROMETER (Auto Stroke Detection) ════════
let strokeTimes = [], filteredY = 0, lastY = 0, lastPeakTime = 0, isRising = false;
let gravity = {x:0, y:0, z:0};
let obsData = []; // for charts

async function requestMotionPermission() {
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm === 'granted') {
        window.addEventListener('devicemotion', handleMotion);
        return true;
      }
      return false;
    } catch (e) { return false; }
  } else {
    window.addEventListener('devicemotion', handleMotion);
    return true;
  }
}

function handleMotion(event) {
  if(!isRunning || !isObservationMode) return;
  let aig = event.accelerationIncludingGravity;
  if(!aig) return;

  // Simple High-pass to remove gravity
  const alphaG = 0.8;
  gravity.x = alphaG * gravity.x + (1 - alphaG) * aig.x;
  gravity.y = alphaG * gravity.y + (1 - alphaG) * aig.y;
  gravity.z = alphaG * gravity.z + (1 - alphaG) * aig.z;
  const accX = aig.x - gravity.x, accY = aig.y - gravity.y, accZ = aig.z - gravity.z;
  
  // Magnitude of acceleration
  const mag = Math.sqrt(accX*accX + accY*accY + accZ*accZ);
  
  // Low-pass to smooth noise
  filteredY = filteredY + 0.2 * (mag - filteredY);
  
  const now = performance.now();
  if (filteredY > lastY) {
    isRising = true;
  } else if (isRising && (lastY - filteredY) > 1.2) { // Stroke peak threshold
    if (now - lastPeakTime > 350) { // Max ~170 SPM
      lastPeakTime = now;
      strokeTimes.push(now);
      totalStrokes++;
      document.getElementById('totalStrokes').textContent = totalStrokes;
      updateObsBPM(now);
    }
    isRising = false;
  }
  lastY = filteredY;
}

function updateObsBPM(now) {
  // Keep strokes within last 12 seconds for stable average
  strokeTimes = strokeTimes.filter(t => now - t < 12000);
  if(strokeTimes.length >= 3) {
    const elapsed = (strokeTimes[strokeTimes.length-1] - strokeTimes[0]) / 1000;
    const spm = (strokeTimes.length - 1) / (elapsed / 60);
    const bpmEl=document.getElementById('actualBpm');
    bpmEl.textContent = spm.toFixed(1);
    bpmEl.classList.remove('beat');void bpmEl.offsetWidth;bpmEl.classList.add('beat');
  }
}

// ════════ DATA EXPORT & SHARE ════════
const mockH = [];
let laps = [];

async function exportCSVAndShare() {
  if(!laps.length && !obsData.length){showToast('無訓練資料可匯出');return;}
  
  let rows = [];
  if (isObservationMode) {
    rows.push('時間(秒),實際BPM,均速km/h');
    obsData.forEach(d => rows.push(`${d.t},${d.spm.toFixed(1)},${d.spd.toFixed(1)}`));
  } else {
    rows.push('LAP,目標BPM,實際BPM,均速km/h,距離,時長');
    laps.forEach(l => {
      const dist=l.dist>=1?`${l.dist.toFixed(2)}km`:`${(l.dist*1000).toFixed(0)}m`;
      rows.push(`"${l.label}",${l.targetBpm},${l.actualBpm.toFixed(1)},${l.avgSpd.toFixed(1)},"${dist}",${l.durationSec.toFixed(1)}s`);
    });
  }

  const csvData = "\uFEFF" + rows.join('\n'); // Add BOM for Excel
  const blob = new Blob([csvData], {type: 'text/csv;charset=utf-8'});
  const filename = `DragonPace_${new Date().toISOString().slice(0,10)}.csv`;
  const file = new File([blob], filename, {type: 'text/csv'});

  if (navigator.share && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({
        title: 'DragonPace 訓練記錄',
        files: [file]
      });
      showToast('✅ 匯出分享成功');
    } catch(e) { console.warn('Share canceled/failed'); }
  } else {
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=filename;a.click();
    showToast('✅ CSV 已下載');
  }
}

// ════════ UI LOGIC ════════
function loadWorkout(w){
  selectedWorkout=w;
  isObservationMode = w.isFree || false;
  document.getElementById('selectedWorkoutLabel').textContent=w.name;
  
  // Toggle UI elements based on mode
  document.getElementById('metroPanel').style.display = isObservationMode ? 'none' : 'flex';
  document.getElementById('segFlowBox').style.display = isObservationMode ? 'none' : 'block';
  document.getElementById('lapTgtCol').style.display = isObservationMode ? 'none' : 'block';
  document.getElementById('courseMetaLabel').textContent= isObservationMode ? '感測器自動計槳' : `${w.sets}組 · ${w.segments.length}段 · 休息${w.rest}s`;
  
  resetTraining();
}

function updateUI(){
  const svEl=document.getElementById('speedVal'); if(svEl)svEl.textContent=simSpeed.toFixed(1);
  const dEl=document.getElementById('distVal'); if(dEl)dEl.textContent=totalDistKm>=1?totalDistKm.toFixed(2):(totalDistKm*1000).toFixed(0)+'m';
}

function toggleTraining(){
  if(!selectedWorkout) return;
  isRunning ? pauseT() : startT();
}

async function startT(){
  if(isObservationMode) {
    const p = await requestMotionPermission();
    if(!p) { showToast('需允許動態感測器才可自動計槳'); return; }
    
    // Start Free Mode
    isRunning=true;
    if(gpsGranted) watchGPS(); else startRealGPS();
    document.getElementById('startBtn').textContent='⏸ 暫停';
    document.getElementById('liveBadge').innerHTML='<div class="live-dot" style="background:var(--cyan)"></div>REC';
    document.getElementById('announceBox').innerHTML='<div class="announce-icon">◈</div><div class="announce-text">自由記錄中，請開始划槳</div>';
    startClock();
    
    // Chart data collection
    obsData = [];
    obsTimer = setInterval(() => {
      let spm = parseFloat(document.getElementById('actualBpm').textContent) || 0;
      if (spm > 0 || simSpeed > 0) obsData.push({ t: elapsedSec, spm: spm, spd: simSpeed });
    }, 1000);
    
  } else {
    // Normal Mode
    isRunning=true;
    if(gpsGranted) watchGPS(); else startRealGPS();
    document.getElementById('startBtn').textContent='⏸ 暫停';
    document.getElementById('liveBadge').innerHTML='<div class="live-dot"></div>LIVE';
    launchMetro(); startClock();
  }
}

function pauseT(){
  isRunning=false; stopClock();
  document.getElementById('startBtn').textContent='▶ 繼續';
  document.getElementById('liveBadge').innerHTML='<div class="live-dot" style="background:var(--gold)"></div>PAUSED';
  
  if(isObservationMode) {
    clearInterval(obsTimer);
    document.getElementById('endBtn').style.display = 'block';
    document.getElementById('resetBtn').style.display = 'none';
  } else {
    stopMetro(); cancelAnimationFrame(arcRaf);
  }
}

function finishFreeTraining() {
  isRunning = false; stopGPS();
  document.getElementById('endBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';
  document.getElementById('startBtn').textContent='▶ 開始';
  document.getElementById('liveBadge').innerHTML='<div class="live-dot" style="background:var(--gold)"></div>DONE';
  document.getElementById('announceBox').innerHTML='<div class="announce-icon">◈</div><div class="announce-text">訓練結束</div>';
  
  // Add a single lap for the entire free session
  laps.push({
    label: '自由記錄', targetBpm: '--', 
    actualBpm: obsData.length ? (obsData.reduce((a,b)=>a+b.spm,0)/obsData.length) : 0,
    avgSpd: obsData.length ? (obsData.reduce((a,b)=>a+b.spd,0)/obsData.length) : 0,
    dist: totalDistKm, durationSec: elapsedSec
  });
  
  saveToHistory();
  renderLapBoard();
  showChartModal();
}

function resetTraining(){
  isRunning=false; stopMetro(); stopClock(); cancelAnimationFrame(arcRaf);
  segIdx=0; strokeInSeg=0; currentSet=1; totalStrokes=0; elapsedSec=0; totalDistKm=0; simSpeed=0;
  strokeTimes = []; lastY = 0; filteredY = 0;
  
  document.getElementById('endBtn').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';
  document.getElementById('startBtn').textContent='▶ 開始';
  document.getElementById('liveBadge').innerHTML='<div class="live-dot" style="background:var(--green)"></div>READY';
  ['arcBpm','actualBpm'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent='--';});
  document.getElementById('elapsedTime').textContent='00:00';
  document.getElementById('totalStrokes').textContent='0';
  document.getElementById('speedVal').textContent='0.0';
  document.getElementById('distVal').textContent='0.00';
  
  laps=[]; renderLapBoard();
  
  if(!isObservationMode) {
    const s0=selectedWorkout?.segments[0];
    if(s0){ document.getElementById('targetBpm').textContent=s0.bpm; document.getElementById('arcBpm').textContent=s0.bpm; }
  }
}

// ════════ CHART ════════
function showChartModal() {
  document.getElementById('chartModal').classList.add('show');
  drawChart();
}
function closeChart() {
  document.getElementById('chartModal').classList.remove('show');
}

function drawChart() {
  const canvas = document.getElementById('resChart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentNode.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);

  const w = rect.width, h = rect.height;
  ctx.clearRect(0,0,w,h);

  if(!obsData || obsData.length < 2) return;

  const maxT = obsData[obsData.length-1].t || 1;
  const maxSpm = Math.max(...obsData.map(d=>d.spm), 80) * 1.1; // 10% headroom
  const maxSpd = Math.max(...obsData.map(d=>d.spd), 15) * 1.1;

  // Draw Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for(let i=1; i<4; i++) {
    ctx.beginPath(); ctx.moveTo(0, h * (i/4)); ctx.lineTo(w, h * (i/4)); ctx.stroke();
  }

  // SPM Line (Gold)
  ctx.beginPath();
  ctx.strokeStyle = '#FFB300';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  obsData.forEach((d, i) => {
    const x = (d.t / maxT) * w;
    const y = h - (d.spm / maxSpm) * h;
    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Speed Line (Cyan)
  ctx.beginPath();
  ctx.strokeStyle = '#00E5FF';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  obsData.forEach((d, i) => {
    const x = (d.t / maxT) * w;
    const y = h - (d.spd / maxSpd) * h;
    if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ════════ METRONOME (Normal Mode) ════════
function launchMetro(){
  const seg=selectedWorkout.segments[segIdx];
  document.getElementById('targetBpm').textContent=seg.bpm;
  document.getElementById('arcBpm').textContent=seg.bpm;
  onBeat();
  metroTimer=setInterval(onBeat,60000/seg.bpm);
}
function stopMetro(){clearInterval(metroTimer);metroTimer=null;}

function onBeat(){
  if(!isRunning || isObservationMode) return;
  const seg=selectedWorkout.segments[segIdx];
  strokeInSeg++; totalStrokes++;
  const remaining=seg.count-strokeInSeg;
  document.getElementById('totalStrokes').textContent=totalStrokes;
  
  if(remaining<=3&&remaining>=1) cdTone(remaining);
  else if((strokeInSeg-1)%4===0) accentTone();
  else beatTone();

  if(remaining<=0){
    stopMetro();
    laps.push({label:`第${currentSet}組·段${segIdx+1}`, targetBpm:seg.bpm, actualBpm:seg.bpm, avgSpd:simSpeed, dist:0, durationSec:0}); // Simplified for space
    renderLapBoard();
    
    segIdx++;
    if(segIdx < selectedWorkout.segments.length) {
      setTimeout(()=>{if(isRunning)launchMetro();}, 300);
    } else {
      isRunning=false; stopClock();
      document.getElementById('startBtn').textContent='▶ 開始';
      document.getElementById('liveBadge').innerHTML='<div class="live-dot" style="background:var(--gold)"></div>DONE';
      saveToHistory();
    }
  }
}

function startClock(){
  clockTimer=setInterval(()=>{
    elapsedSec++;
    document.getElementById('elapsedTime').textContent=String(Math.floor(elapsedSec/60)).padStart(2,'0')+':'+String(elapsedSec%60).padStart(2,'0');
  },1000);
}
function stopClock(){clearInterval(clockTimer);clockTimer=null;}

// ════════ INIT & UI HELPERS ════════
document.addEventListener('DOMContentLoaded',()=>{
  renderPresets(); startRealGPS();
  loadWorkout(PRESETS[0]);
});

function renderPresets(){
  document.getElementById('presetList').innerHTML=PRESETS.map(w=>`
    <div class="workout-item${selectedWorkout?.id===w.id?' selected':''}" onclick="selectWorkout('${w.id}')">
      <div class="wi-header"><span class="wi-name" style="color:${w.isFree?'var(--cyan)':'#fff'}">${w.name}</span><span class="wi-tag">${w.tag}</span></div>
    </div>`).join('');
}
function selectWorkout(id){
  const w=PRESETS.find(x=>x.id===id);
  if(w){loadWorkout(w);showToast('已載入：'+w.name);renderPresets();}
}
function renderLapBoard(){
  const list=document.getElementById('lapList');
  if(!laps.length) return;
  list.innerHTML=[...laps].reverse().map((lap)=>`
    <div class="lap-row">
      <div class="lap-idx-label">${lap.label}</div>
      ${isObservationMode ? '' : `<div class="lap-target-val">${lap.targetBpm}</div>`}
      <div class="lap-cell-val" style="color:var(--green)">${lap.actualBpm.toFixed(1)}</div>
      <div class="lap-cell-val lc-blue">${lap.avgSpd.toFixed(1)}</div>
      <div class="lap-cell-val lc-blue">${lap.dist>=1?lap.dist.toFixed(2)+'km':(lap.dist*1000).toFixed(0)+'m'}</div>
    </div>`).join('');
}
function saveToHistory(){
  mockH.unshift({date:`${new Date().getMonth()+1}/${new Date().getDate()}`,name:selectedWorkout.name,strokes:totalStrokes});
}
function showPage(id,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(btn)btn.classList.add('active');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
</script>
</body>
